[variables]
NODE_ENV = 'production'

[phases.setup]
nixPkgs = ['nodejs_22', 'pnpm-9_x']

[phases.install]
cmds = [
  'npm install -g corepack@0.24.1 && corepack enable',
  'pnpm install --frozen-lockfile'
]

[phases.build]
cmds = ['pnpm run build']

[phases.start]
cmd = 'pnpm start'

[staticAssets]
# Enable static asset serving
"/public" = "public"
"/.next/static" = ".next/static"