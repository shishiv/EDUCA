task_groups:
  # FASE 1: Frequência Básica (Prioridade Alta)
  - name: 1.1 - Extensão do Schema de Banco de Dados
    phase: 1
    priority: HIGH
    subagent: backend-api
    description: Database migrations, RLS policies, schema extensions
    duration_estimate: "6-8h"
    dependencies: []

  - name: 1.2 - Extensão do AttendanceGrid para 3 Estados
    phase: 1
    priority: HIGH
    subagent: frontend-components
    description: React component extension, unit tests, 3-state attendance UI
    duration_estimate: "6-8h"
    dependencies: ["1.1"]

  - name: 1.3 - Bloqueio Automático às 18:00
    phase: 1
    priority: HIGH
    subagent: backend-api
    description: Database triggers, time-based locking, immutability enforcement
    duration_estimate: "4-6h"
    dependencies: ["1.1"]

  - name: 1.4 - Interface de Frequência Diária
    phase: 1
    priority: HIGH
    subagent: frontend-components
    description: Daily attendance UI, form integration, real-time sync
    duration_estimate: "8-10h"
    dependencies: ["1.2", "1.3"]

  # FASE 2: Conteúdo Ministrado (Prioridade Alta)
  - name: 2.1 - API e Types para Conteúdo da Aula
    phase: 2
    priority: HIGH
    subagent: backend-api
    description: API endpoints, TypeScript types, database queries for lesson content
    duration_estimate: "4-6h"
    dependencies: ["1.1"]

  - name: 2.2 - Formulário de Conteúdo Estruturado (BNCC)
    phase: 2
    priority: HIGH
    subagent: frontend-components
    description: BNCC-compliant form component, validation, field integration
    duration_estimate: "6-8h"
    dependencies: ["2.1"]

  - name: 2.3 - Interface Card-Based para Histórico de Aulas
    phase: 2
    priority: HIGH
    subagent: frontend-components
    description: Card-based UI design, lesson history list, responsive layout
    duration_estimate: "8-10h"
    dependencies: ["2.1", "2.2"]

  # FASE 3: Sistema de Notas (Prioridade Média)
  - name: 3.1 - Sistema de Notas Bimestrais (Fundamental I)
    phase: 3
    priority: MEDIUM
    subagent: backend-api
    description: Grade management API, quarterly system, note calculations
    duration_estimate: "6-8h"
    dependencies: ["1.1"]

  - name: 3.2 - Relatórios Descritivos (Ed. Infantil)
    phase: 3
    priority: MEDIUM
    subagent: backend-api
    description: Descriptive report storage, experience fields, semester management
    duration_estimate: "6-8h"
    dependencies: ["1.1"]

  - name: 3.3 - Boletim do Aluno
    phase: 3
    priority: MEDIUM
    subagent: frontend-components
    description: Student report card UI, grade display, responsive design
    duration_estimate: "6-8h"
    dependencies: ["3.1", "3.2"]

  # FASE 4: Relatórios e Exportação (Prioridade Média)
  - name: 4.1 - Relatórios de Frequência
    phase: 4
    priority: MEDIUM
    subagent: backend-queries
    description: Attendance report generation, aggregations, date filtering
    duration_estimate: "4-6h"
    dependencies: ["1.1"]

  - name: 4.2 - Alerta Bolsa Família
    phase: 4
    priority: MEDIUM
    subagent: backend-api
    description: Bolsa Família compliance, NIS tracking, 80% threshold alerts
    duration_estimate: "4-6h"
    dependencies: ["1.1", "4.1"]

  - name: 4.3 - Exportação PDF e Excel
    phase: 4
    priority: MEDIUM
    subagent: frontend-components
    description: PDF/Excel export components, report formatting, download UI
    duration_estimate: "6-8h"
    dependencies: ["4.1", "4.2"]

  - name: 4.4 - Relatório de Conteúdo Ministrado
    phase: 4
    priority: MEDIUM
    subagent: backend-queries
    description: Content report generation, BNCC skills analysis, period filtering
    duration_estimate: "4-6h"
    dependencies: ["2.1"]

  # FASE 5: Polimento UX (Prioridade Baixa)
  - name: 5.1 - Otimização Mobile
    phase: 5
    priority: LOW
    subagent: frontend-responsive
    description: Tablet/mobile responsiveness, touch optimization, viewport adaptation
    duration_estimate: "4-6h"
    dependencies: ["1.4", "2.3", "3.3"]

  - name: 5.2 - Melhorias de Performance
    phase: 5
    priority: LOW
    subagent: performance-optimizer
    description: Bundle optimization, query caching, lazy loading, Core Web Vitals
    duration_estimate: "4-6h"
    dependencies: ["1.4", "2.3", "4.3"]

  - name: 5.3 - Feedback Visual e Acessibilidade
    phase: 5
    priority: LOW
    subagent: frontend-accessibility
    description: WCAG compliance, error messages, loading states, visual feedback
    duration_estimate: "4-6h"
    dependencies: ["1.4", "2.3", "3.3"]

  # FASE 6: Revisão e Validação
  - name: 6.1 - Revisão de Testes e Gap Analysis
    phase: 6
    priority: CRITICAL
    subagent: implementation-verifier
    description: E2E test coverage, compliance validation, documentation review
    duration_estimate: "4-6h"
    dependencies: ["1.4", "2.3", "3.3", "4.3", "5.1", "5.2", "5.3"]
